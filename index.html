<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Last Night</title>
<meta name="description" content="The Last Night — a tabletop RPG of cosmic horror in the dying world of Andolus." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital@0;1&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#14110E; --ink:#E8E1D6; --ink-2:#BAB1A5; --ink-3:#857C71; --accent:#A8201C; --line:rgba(133,124,113,.35); }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(120% 80% at 50% 0%, #1C1813 0%, var(--bg) 70%);
    color: var(--ink); font-family: 'EB Garamond', serif;
    display: grid; place-items: center; padding: 24px; text-align: center;
  }
  .kicker { font-family: 'Spline Sans Mono', monospace; font-size: 11px; letter-spacing: .32em;
    text-transform: uppercase; color: var(--ink-3); }
  .kicker b { color: var(--accent); }
  h1 { font-family: 'Cormorant', serif; font-weight: 600; font-size: clamp(48px, 11vw, 104px);
    margin: 12px 0 4px; line-height: .95; }
  .tag { font-style: italic; color: var(--ink-2); font-size: clamp(16px, 2.4vw, 20px); max-width: 46ch; margin: 0 auto 32px; }
  .cta { display: inline-block; font-family: 'Spline Sans Mono', monospace; font-size: 13px;
    letter-spacing: .12em; text-transform: uppercase; text-decoration: none;
    color: var(--ink); border: 1px solid var(--accent); padding: 14px 28px; transition: background .15s, color .15s; }
  .cta:hover { background: var(--accent); color: var(--bg); }
  .url { display: block; margin-top: 14px; font-family: 'Spline Sans Mono', monospace;
    font-size: 11px; letter-spacing: .1em; color: var(--ink-3); }
</style>
</head>
<body>
  <main>
    <p class="kicker">ANDOLUS · MDC 4980 · <b>THE LAST NIGHT</b></p>
    <h1>The Last Night</h1>
    <p class="tag">A tabletop RPG of cosmic horror in the dying world of Andolus.</p>
    <a class="cta" href="https://characters.tlnrpg.com">Enter the Companion App →</a>
    <span class="url">characters.tlnrpg.com</span>
  </main>
</body>
</html>
